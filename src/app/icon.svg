<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Globe circle -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="white" stroke-width="24"/>
    <!-- Horizontal line -->
    <line x1="-140" y1="0" x2="140" y2="0" stroke="white" stroke-width="20"/>
    <!-- Vertical ellipse -->
    <ellipse cx="0" cy="0" rx="70" ry="140" fill="none" stroke="white" stroke-width="20"/>
    <!-- Top arc -->
    <path d="M-110,-55 Q0,-80 110,-55" fill="none" stroke="white" stroke-width="18"/>
    <!-- Bottom arc -->
    <path d="M-110,55 Q0,80 110,55" fill="none" stroke="white" stroke-width="18"/>
    <!-- Arrow/side indicator -->
    <path d="M155,-20 L195,0 L155,20" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
